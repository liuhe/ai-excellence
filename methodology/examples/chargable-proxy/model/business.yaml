# Business View — Overview
# Source: chargable-proxy-redesign.yaml (business section)

organization: Chargable Proxy Service

business_workers:
  - Admin

external_parties:
  - name: Switch Game Players
    participants:
      - name: Player
        type: person
      - name: Switch Console
        type: device
  - name: Taobao E-Commerce Platform
    type: system

systems:
  - name: Chargable Proxy System
    use_cases:
      - name: Create Accounts
        package: Admin Operations
        actor: Admin
        entry: manager-ui.BatchCreateAccounts
      - name: Create Packages
        package: Admin Operations
        actor: Admin
        entry: manager-ui.CreatePackages
      - name: Generate Redemption Codes
        package: Admin Operations
        actor: Admin
        entry: manager-ui.GenerateRedemptionCodes
      - name: Configure SKU Mapping
        package: Admin Operations
        actor: Admin
        entry: manager-ui.ManageSkuMapping
      - name: Receive Trade Notification
        package: Taobao Auto-Fulfillment
        actor: Taobao E-Commerce Platform
        entry: manager-server.ReceiveTradeNotification
        associations:
          - relation: Include
            name: Auto Fulfill Order
      - name: Auto Fulfill Order
        package: Taobao Auto-Fulfillment
        entry: manager-server.AutoFulfillOrder
      - name: Handle Refund
        package: Taobao Auto-Fulfillment
        actor: Taobao E-Commerce Platform
        entry: manager-server.HandleRefund
      - name: Sync Unprocessed Orders
        package: Taobao Auto-Fulfillment
        actor: System
        entry: manager-server.SyncUnprocessedOrders
        associations:
          - relation: Include
            name: Auto Fulfill Order
      - name: Redeem Code
        package: Player Self-Service
        actor: Player
        entry: manager-ui.RedeemCode
      - name: Query Account
        package: Player Self-Service
        actor: Player
        entry: manager-ui.QueryAccount
      - name: Proxy HTTP Request
        package: Proxy
        actor: Switch Console
        entry: auth-proxy.AuthenticateAndForward

business_use_cases:
  - name: Accelerate Game Downloads
    actor: Player
    system_use_cases:
      - Proxy HTTP Request
      - Query Account
    stakeholder_interests:
      - stakeholder: Player
        interest: Download Nintendo Switch games at significantly faster speeds
      - stakeholder: Admin
        interest: Provide reliable proxy service, generate revenue

  - name: Activate Service
    actor: Player
    system_use_cases:
      - Redeem Code
      - Query Account
    stakeholder_interests:
      - stakeholder: Player
        interest: Quickly activate purchased traffic package using redemption code

  - name: Operate Proxy Service
    actor: Admin
    system_use_cases:
      - Create Accounts
      - Create Packages
      - Generate Redemption Codes
      - Configure SKU Mapping
    stakeholder_interests:
      - stakeholder: Admin
        interest: Efficiently manage accounts, packages, codes, and Taobao SKU mappings

  - name: Sell via Taobao (Auto-Fulfillment)
    actor: Taobao E-Commerce Platform
    system_use_cases:
      - Receive Trade Notification
      - Auto Fulfill Order
      - Handle Refund
      - Sync Unprocessed Orders
    stakeholder_interests:
      - stakeholder: Player
        interest: Receive proxy credentials immediately after payment, no manual steps
      - stakeholder: Admin
        interest: Zero manual intervention for sales; fully automated provisioning and delivery
