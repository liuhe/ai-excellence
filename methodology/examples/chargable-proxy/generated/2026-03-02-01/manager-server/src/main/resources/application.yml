server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:jpa}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

app:
  admin-key: ${ADMIN_KEY:admin123}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: jpa
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/proxy_manager?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

---
spring:
  config:
    activate:
      on-profile: memory
  datasource:
    url: jdbc:h2:mem:proxydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
