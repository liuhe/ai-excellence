# DCDDP Meta-Model Schema v2.0 (multi-file)
#
# This schema defines the structure for declarative system modeling.
# A model conforming to this schema provides enough information for AI
# to generate a complete, runnable system.
#
# Conventions: see modeling-conventions.md (in same directory).
# AI prompt: see system-modeling-prompt.md.
#
# Design principles:
#   1. Users define WHAT, AI derives HOW.
#   2. Constraints reduce AI's choice space; natural-language rules give AI freedom.
#   3. Configuration should be <10% of equivalent code volume.
#   4. Models express intent and constraints; AI fills in implementation details.

# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================
#
# A model is a DIRECTORY (not a single file), organized by 4 views:
#
#   model/
#   ├── business.yaml              # business view overview
#   ├── business/                  # business view details (optional)
#   ├── business-model.yaml        # business-level entities (was: domain.yaml)
#   ├── business-model/            # entity details
#   │   ├── <Entity>.yaml          # one file per business entity (含 archetype 四色)
#   │   └── er.svg                 # ER diagram
#   ├── applications.yaml          # applications view overview (apps + topology)
#   ├── applications/              # applications view details
#   │   ├── <app-name>.yaml        # one file per application; 含 domain_model 段（DDD）
#   │   └── application-topology.svg
#   ├── deployment.yaml            # deployment view overview
#   └── deployment/                # deployment details
#       └── topology.svg
#
# Each view's overview yaml is mandatory. Details (sub-files in same-named
# subdirectory) are optional and added as the model deepens.
#
# Naming convention: overview yaml `X.yaml` ↔ details directory `X/`.
#
# **业务模型 vs 应用领域模型**（关键概念区分，详见 SCHEMA NOTE 15）：
#   - business-model.yaml: 业务概念在"世界里"长什么样，跨 app 共用，用四色建模标注 archetype
#   - applications/<app>.yaml 的 domain_model 段: 该 app 的代码层结构如何实现这些业务概念，用 DDD 构造块（Aggregate / VO / Repo / Service / Event）
#   - 同一业务实体在不同 app 里可能有不同的 DDD 实现（甚至有的 app 根本不实现）

# =============================================================================
# FILE 1: business.yaml — Business View
# =============================================================================
#
# Captures: WHO interacts with the system and WHAT value is delivered.
# Includes: organization, internal/external participants, systems, system use
# cases (thin glue layer), and business use cases (value propositions).

business_yaml_schema:

  organization: string                      # required

  business_workers: string | string[]       # internal operators of the system

  external_parties:                          # external participants, grouped by party
    - name: string                          # required, the party/organization name
      type: system                          # optional, set when the party itself IS a system
      participants:                          # optional, when the party has people/devices
        - name: string
          type: person | device | system    # required
      use_cases:                            # optional, for system-type parties
        - name: string
          actor: string

  systems:                                  # the systems being modeled
    - name: string                          # required, globally unique
      use_cases:                            # SYSTEM USE CASES — thin glue layer, NO rules
        - name: string                      # unique within this system
          package: string                   # optional, logical grouping
          actor: string
          entry: string                     # entry application use case (format: <app-name>.<UseCaseName>)
          associations:                      # optional, Include/Extend between system use cases
            - relation: Include | Extend
              name: string                  # target system use case name (same system)

  business_use_cases:                       # value propositions
    - name: string                          # unique within business_use_cases
      actor: string                         # who triggers it / receives the value
      system_use_cases: string[]            # references systems[].use_cases by name
      stakeholder_interests:                 # optional, surfaces hidden expectations
        - stakeholder: string
          interest: string

# =============================================================================
# FILE 2: business-model.yaml — Business-Level Entities (业务视图的一部分)
# =============================================================================
#
# A scannable list of business entities + relationships. 业务概念在"世界里"长什么样，
# 跨 app 共用。每个实体用四色建模标注 archetype。
# 不描述代码实现（那是各 app 的 domain_model 段的事，见 FILE 5）。

business_model_yaml_schema:

  entities:                                  # one entry per business entity
    - name: string                          # PascalCase, globally unique within business model
      summary: string                       # one-line description
      detail: string                        # path to detail file, e.g., ./business-model/Account.yaml

  # 注意：cross-entity 关系**不再放这里**，改为在每个 entity detail 文件里用 `relationships:` 段
  # 表达（统一关系模型，见 SCHEMA NOTE 12）。viewer 加载所有 detail 文件后聚合出关系网络。

  diagram: string                           # optional, path to SVG (e.g., ./business-model/er.svg)

# =============================================================================
# FILE 3: business-model/<Entity>.yaml — Business Entity Detail
# =============================================================================
#
# Full specification for one business entity: fields, state machine, rules, notes.

business_entity_detail_yaml_schema:

  name: string                              # PascalCase, must match business-model.yaml entry
  archetype: moment-interval | role | party-place-thing | description
                                            # optional, 4-color modeling 类型；详见 SCHEMA NOTE 13

  relationships: <Relationship[]>           # optional — 本实体出向的关系（见 SCHEMA NOTE 12）
                                            #   每条关系含 kind（depends-on/implements/associates/composition）+
                                            #   target + target_kind 等字段；只记主动方，被动方由 viewer 推导

  fields:                                    # required, compact format
    - field_name: "Type, description"       # e.g., id: "Long, auto-increment primary key"
                                            # Types: String, Long, Integer, int, boolean,
                                            # Enum(Value1/Value2/...), or domain types

  notes: string                             # optional, important domain rules about this entity

  state_machine:                            # optional, for entities with lifecycle
    field: string                           # the field that holds the state
    states: string[]
    transitions:
      - from: string                        # source state, or "*" for any
        to: string
        trigger: string                     # natural language: what causes this
    notes: string                           # optional

  rules:                                     # optional, entity-level rules
    - content: string                       # the rule description
      field: string                         # optional, which field this applies to
      related_use_cases: string[]           # optional, format: <app-name>.<UseCaseName>

# =============================================================================
# FILE 4: applications.yaml — Applications Overview
# =============================================================================
#
# A scannable list of applications + their interaction topology. Each
# application has a one-line summary and a `detail` pointer.

applications_yaml_schema:

  applications:
    - name: string                          # kebab-case, globally unique
      type: frontend | client | backend | proxy | external
      tech_stack:                            # concise here; full version in detail file
        language: string
        frameworks: string[]                # optional
      summary: string
      detail: string                        # path to detail file

  application_topology:                      # was `system.overview` in v1 schema
    # High-level semantic view of how applications and external endpoints interact.
    # Arrow direction = SEMANTIC FLOW (data/value direction), NOT technical call direction.
    # A pair of applications can have multiple edges with different directions/types.
    - from: string                          # application name OR external actor/device
      to: string
      label: string                         # semantic description
      type: sync | call                     # sync = async (poll/push/MQ); call = real-time RPC/REST
      details: string[]                     # optional, references to use case names

  diagram: string                           # optional, path to SVG

# =============================================================================
# FILE 5: applications/<app-name>.yaml — Application Detail
# =============================================================================
#
# Full specification for one application: tech stack, infrastructure, use
# cases (with rules), and pages (frontend only).

application_detail_yaml_schema:

  name: string                              # kebab-case, must match applications.yaml entry
  type: frontend | client | backend | proxy | external

  tech_stack:                                # constrains AI's tech choices
    language: string
    frameworks: string[]                    # optional
    storage: string                         # optional
    middleware: string[]                    # optional
    implementation: string                  # optional, for external/wrapper apps

  infrastructure:                            # optional, dependencies on databases/caches/MQs
    - name: string                          # e.g., "MySQL", "Redis (session cache)"
      type: string                          # database, cache, message-queue, search, etc.
      description: string                   # purpose and configuration notes

  use_cases:                                 # APPLICATION USE CASES — implementation logic
    - name: string                          # unique WITHIN this application (cross-app same name OK)
      package: string                       # optional, logical grouping
      actor: string
      api: string[]                         # optional, API endpoints (backend / client / proxy that exposes endpoints)
      rules:                                 # optional, natural-language CONSTRAINTS
        - content: string
          related_entities: string[]        # optional, format: EntityName or EntityName.fieldName
      associations:                          # optional, cross-application dependencies
        - relation: Include | Extend
          application: string               # optional; omit if same app
          name: string                      # target use case name

  pages:                                     # frontend / client (any app with UI)
    - name: string                          # PascalCase
      related_use_cases: string[]           # references use case names within this app
      external_links:                        # optional
        - label: string
          url: string
      display_mappings: string[]            # optional, natural-language UI transformation rules

  domain_model:                              # OPTIONAL — 该 app 的 DDD 应用领域模型（FILE 5 的可选段，详见 SCHEMA NOTE 15）
                                            # 简单 frontend / proxy / external 类 app 通常不需要；有内核逻辑的 backend / client 才填
                                            # 所有构造块都可有 `relationships:` 段表达出向关系，统一关系模型见 SCHEMA NOTE 12
    roles:                                  # optional — 应用层接口/角色定义（DDD 中显式建模"契约"）
      - name: string                        # PascalCase, e.g., MessageDecoder
        methods: string[]                   # 暴露的操作签名，e.g., ["decode(bytes) -> Message"]
        relationships: <Relationship[]>     # optional
        notes: string                       # optional

    aggregates:                              # 聚合：根实体 + 内含实体 + VO + 不变量
      - name: string                        # PascalCase, e.g., AccountAggregate
        root: string                        # 必须引用 entities[] 中已定义的某个实体名（本层实体）。
                                            # 不在此声明字段——字段在被引用的 entities[] 项里。
                                            # 不能引用业务实体（业务实体不属于本层），跨层映射通过下面的
                                            # relationships: [{kind: implements, target_kind: business-entity}] 表达。
                                            # 详见 SCHEMA NOTE 17。
        relationships: <Relationship[]>     # optional — e.g., 实现 Role / 关联其他 Aggregate / 跨层映射 BusinessEntity
        entities:                            # 本聚合定义的所有实体（**包含 root**，root 是其中一员）
          - name: string                    # PascalCase
            relationships: <Relationship[]> # optional
            fields:
              - field_name: "Type, description"
        value_objects:                       # 聚合内的 VO
          - name: string
            relationships: <Relationship[]> # optional
            fields:
              - field_name: "Type, description"
        invariants: string[]                # 聚合不变量（自然语言）
        notes: string                       # optional

    value_objects:                          # optional — 跨聚合共享的 VO
      - name: string
        relationships: <Relationship[]>     # optional
        fields:
          - field_name: "Type, description"

    repositories:                            # optional — 仓储抽象
      - name: string                        # 例如 AccountRepository
        relationships: <Relationship[]>     # required — 至少一条 kind=composition 指向其管理的 Aggregate
        operations: string[]                # 例如 ["findById(id)", "save(account)", "findActive()"]

    domain_services:                         # optional — 领域服务（不属于单一聚合的逻辑）
      - name: string                        # 例如 PriceCalculator
        relationships: <Relationship[]>     # optional — e.g., depends-on Repository / Service
        operations: string[]
        notes: string                       # optional

    domain_events:                           # optional — 领域事件
      - name: string                        # 例如 AccountActivated
        published_when: string              # 何时发布
        relationships: <Relationship[]>     # optional — e.g., associates publisher Aggregate/Service
        payload:                             # optional
          - field_name: "Type, description"

# === Relationship 类型定义 ===
relationship_schema:
  kind: depends-on | implements | associates | composition  # 详见 SCHEMA NOTE 12
  target: string                          # 目标构造块名
  target_kind: business-entity | role | aggregate | value-object | repository | domain-service | domain-event
                                          # optional, 帮助消歧（同名跨类型时必须提供）
  bidirectional: boolean                  # optional, default false; 仅 associates 可设 true
  cardinality: one-to-one | one-to-many | many-to-one | many-to-many
                                          # optional, 一般用于 associates / composition
  via: string                             # optional, the field name carrying the reference
  note: string                            # optional

# =============================================================================
# FILE 6: deployment.yaml — Deployment View
# =============================================================================
#
# Physical/logical deployment: nodes, network topology, configuration.
# Schema is preliminary — refine as deployment cases accumulate.

deployment_yaml_schema:

  nodes:
    - name: string
      type: vm | container | service        # extend as needed
      location: string                      # region or environment
      hosts: string[]                       # application names hosted here

  network:
    - from: string                          # node name
      to: string                            # node name
      port: integer
      protocol: tcp | udp | http | https

  config:                                    # per-application configuration
    - application: string
      env: string[]                         # e.g., ["DB_URL=...", "LOG_LEVEL=info"]
      secrets: string[]                     # secret keys (values managed externally)

  diagram: string                           # optional, path to SVG

# =============================================================================
# SCHEMA NOTES
# =============================================================================

# 1. NAMESPACES AND CROSS-FILE REFERENCES
#
#    `name` is unique WITHIN ITS SEMANTIC NAMESPACE, not globally:
#      - Business use case: unique within business_use_cases
#      - System use case: unique within its system
#      - Application use case: unique within its application (cross-app same name allowed)
#      - Entity / Application / System: globally unique
#
#    Cross-namespace references use the `<namespace>.<name>` format:
#      - entry: manager-ui.BatchCreateAccounts
#      - related_use_cases: [auth-proxy.AuthenticateAndForward]
#      - For app-level associations: `application` + `name` separately
#
#    Viewer responsibility: load all yaml, validate name uniqueness within
#    each namespace, support click-through navigation across files.

# 2. THREE-LAYER USE CASE STRUCTURE
#
#    Business use cases  → business.yaml          → value propositions
#    System use cases    → business.yaml          → thin glue, NO rules, has entry
#    Application use cases → applications/<app>.yaml → implementation, rules, associations
#
#    Traceability: page → app use case → system use case → business use case.
#    Pages do NOT directly reference business use cases.
#    `entry` only points to the front-door app use case; downstream is inferred from Include chain.

# 3. FIELD FORMAT (entity files)
#
#    Fields use the compact "name: Type, description" format:
#      - id: "Long, auto-increment primary key"
#      - status: "PackageStatus(Pending/Active/Expired/Exhausted), package state"
#
#    This keeps detail files readable while providing enough info for AI to
#    generate correct code.

# 4. STATE MACHINES
#
#    Defined inline in the entity detail file, co-located with the entity.
#    Only entities with status/lifecycle fields need a state_machine block.

# 5. NATURAL LANGUAGE RULES
#
#    Rules are free-form natural language. They serve as CONSTRAINTS on AI
#    behavior, not executable specifications. Rules live in two places:
#      - Business entity rules (business-model/<Entity>.yaml rules)
#      - Application use case rules (applications/<app>.yaml use_cases[].rules)
#
#    Both support cross-references for bidirectional traceability:
#      - Entity rule.related_use_cases → app use case
#      - App use case rule.related_entities → entity (or entity.field)
#
#    Rules are never duplicated — they live in one place and link to the other.

# 6. RELATIONSHIPS vs FIELD-LEVEL REFERENCES
#
#    Field-level references (e.g., "userId: Long, references User") give the
#    implementation hint. The relationships section in business-model.yaml gives the
#    big-picture overview. Use the explicit relationships entry for cardinality,
#    lifecycle coupling, or non-obvious associations.

# 7. APPLICATION TOPOLOGY (was system.overview)
#
#    A high-level semantic view of inter-application interactions. Manually
#    authored (cannot be derived from use case associations alone).
#      - Arrow direction = SEMANTIC FLOW (data/value), not technical call direction.
#        Example: if proxy polls manager-server for user data, arrow is
#        "manager-server → proxy: Provide User Data".
#      - type: sync (async sync, polling, push, MQ) vs call (real-time RPC/REST).
#      - A pair of apps can have multiple edges with different directions/types.
#      - External actors and devices can appear as endpoints alongside applications.

# 8. DIAGRAMS (SVG)
#
#    Diagrams are SVG files placed in the corresponding view's details directory
#    and referenced via the `diagram` field. SVG is preferred over mermaid for
#    flexibility (AI-generated, viewer-renderable, designer-editable).
#
#    CRITICAL: SVG must NOT carry information beyond what is in the YAML. It is
#    a visualization, not a parallel source of truth. Theoretically the SVG
#    should be regenerable from the YAML.

# 9. USE CASE PACKAGE GROUPING
#
#    Optional `package` field on system use cases and application use cases for
#    logical grouping (e.g., "Admin Operations", "Taobao Integration"):
#      - List view: groups packages as separate cards
#      - Use case diagram: package boundaries via dagre compound layout
#    Backwards compatible — no package = ungrouped.

# 10. WHAT'S INTENTIONALLY LEFT OUT (HOW concerns)
#
#    - Database DDL, indexes, migration scripts (AI derives from entities + tech stack)
#    - UI component hierarchy, CSS (AI derives from pages + display_mappings)
#    - Authentication token formats, session internals (AI derives from rules)
#    - Internal class/package structure (AI's freedom)
#    - Logging, monitoring (modeled in deployment view if cross-cutting)

# 11. APPLICATION TYPE — frontend vs client
#
#    Both are user-facing, but differ in how much logic they own:
#      - frontend: thin UI dispatching to backend (browser SPA, mobile shell whose
#        meaningful work happens on backend). Has `pages`, no `api`, no
#        `infrastructure`.
#      - client: "thick" client with embedded server-like work (media routing /
#        codec / signaling / local services / P2P). Often runs as desktop /
#        mobile / agent. May have `pages` (UI), `api` (exposed endpoints),
#        `infrastructure` (embedded stack). Use when the client meaningfully
#        runs without the backend or contains its own daemons.
#
#    The cut: if removing the backend leaves the user with anything useful, it's
#    a client. If removing the backend leaves the user with nothing, it's a
#    frontend.

# 12. RELATIONSHIPS — 统一关系模型（业务模型与应用领域模型共用）
#
#    每个构造块（business entity / aggregate / VO / repository / service / event / role）
#    都可有可选的 `relationships:` 段，列出本构造块**出向**的关系。每条关系：
#
#      - kind: depends-on | implements | associates | composition
#      - target: <name>                       目标构造块名
#      - target_kind: business-entity | role | aggregate | value-object | repository | domain-service | domain-event
#                                             optional, 跨类型同名时必填以消歧
#      - bidirectional: true                  optional, 仅 associates 可设；表"双向引用"
#      - cardinality: one-to-one | one-to-many | many-to-one | many-to-many
#                                             optional, 一般用于 associates / composition
#      - via: <field name>                    optional, 持有引用的字段
#      - note: <string>                       optional
#
#    四种 kind 的语义：
#
#      depends-on（依赖）：A 临时用 B 完成工作，不持有 B 的引用。
#        例：DomainService 依赖 Repository（调用其方法即用即弃）；
#            Service 依赖另一个 Service。
#        视觉：虚线 + 普通箭头。
#
#      implements（实现）：A 实现 B 的契约（接口 / Role）；A 必须满足 B 的方法签名。
#        例：AccountAggregate implements PackageActivationTarget（应用层 Role）；
#            Person implements Customer（业务模型 Role 实体）；
#            AccountAggregate implements Account（跨层映射：应用聚合实现业务实体）。
#        视觉：虚线 + UML 空心三角箭头（realization）。
#
#      associates（关联）：A 持有 B 的引用（字段、ID 引用）；可单向或双向。
#        例：Order associates Customer（订单关联下单用户，单向）；
#            Peer associates DirectLink（peer 引用其直连配置）。
#        视觉：实线 + 普通箭头；bidirectional=true 时双端无箭头。
#
#      composition（聚合 / 强所有权）：A 拥有 B；B 的生命周期依附于 A——A 删除则 B 消失。
#        实现上常表现为值类型 / 嵌入式 struct / 内联 JSON，B 没有独立 ID 或存储表。
#        例：DirectLink composition ProxyConfig（代理配置嵌入直连配置）；
#            Repository composition Aggregate（仓储管理聚合的生命周期）。
#        视觉：实线 + UML 实心菱形（在源端）。
#
#    存储约定：
#      - 有向关系（depends-on / implements / composition）：记在主动方
#      - 双向关联（associates with bidirectional=true）：记一边即可，viewer 推导另一边
#      - 单向关联（associates）：记在持有引用的一方
#
#    Viewer 责任：
#      - 加载所有构造块后，建立"出向 + 入向"的双向索引
#      - 渲染时按 kind 用不同样式
#      - detail 页面同时展示主动出向关系和被动入向关系（"被谁依赖 / 被谁实现 / 被谁关联"）

# 13. ENTITY ARCHETYPE — 四色建模（Peter Coad）
#
#    可选字段 `archetype`（写在 entity detail yaml 顶层），为实体打一个原型标签：
#
#      - moment-interval（粉色）：时刻 / 时段类，"什么发生了"。本质是事件、过程、交易、会话；
#        有时间属性（at / start-end），常承载业务流程的关键状态机。
#        例：Order, Payment, MediaFrame, ConnectionSession, MeetingInstance
#
#      - role（黄色）：参与角色，"在某情境下扮演什么"。把 PPT 接入 MI；本身不"独立存在"，
#        总是依附于一个 PPT 在某 MI 中的角色。
#        例：Customer, Teacher, ConferenceHost, RelayClient
#
#      - party-place-thing（绿色，简称 PPT）：参与方 / 地点 / 物，"持续存在的人物地物"。
#        身份独立、生命周期长。
#        例：Person, Node, Company, Vehicle, Building, Device
#
#      - description（蓝色）：描述 / 规范 / 分类，"可复用的属性集 / 配置 / 模板"。
#        多个实例共享一份描述；常以"什么类型 / 什么级别 / 什么模板"出现。
#        例：ProductType, ProxyConfig, RelayServerConfig, PackageTemplate, ChannelSpec
#
#    判断顺口溜（按优先级）：
#      1) 有时间发生 → MI（粉）
#      2) "X as Y in Z" 表达（X 是个角色，配合 PPT 与 MI）→ Role（黄）
#      3) 长期存在的具体存在 → PPT（绿）
#      4) 共享的属性集 / 配置规格 → Description（蓝）
#
#    Viewer：按 archetype 上色（粉 / 黄 / 绿 / 蓝）。无 archetype 字段则用中性灰，不强制。

# 14. MARKDOWN IN TEXT FIELDS
#
#    若干文本字段（rule.content, entity notes, summary, application_topology.label 等）
#    支持 markdown 渲染（viewer 内联呈现，链接可点击）。
#
#    **相对链接的路径约定**：相对路径以**包含该 markdown 文本的 YAML 文件所在目录**为基准。
#    例如在 `applications/vchat-client.yaml` 的 rule.content 中写
#    `[流程图](./vchat-client/flow.svg)`
#    会被 viewer 解析为 `<model-root>/applications/vchat-client/flow.svg`（即把 svg 放在
#    与 yaml 同级的 `vchat-client/` 子目录里）。
#
#    Viewer 实现：loadModel 在加载 detail YAML 时记录其 `_sourceDir`（注入到该实体/应用对象上），
#    渲染 markdown 时用 _sourceDir 作为相对链接前缀。
#
#    支持的 markdown 元素：链接 `[label](url)`、行内代码 `` `code` ``、加粗 `**bold**`、
#    斜体 `*italic*`、列表（`- item` / `1. item`）。块级 markdown（多段落）会被压成单段，
#    所以适合短文本，不适合长 markdown 文档（长文档建议放独立 .md 文件用链接引用）。

# 15. BUSINESS MODEL vs APPLICATION DOMAIN MODEL
#
#    DCDDP 区分两层模型，受众与建模工具不同：
#
#    业务模型（business-model.yaml + business-model/）：
#      - 内容：业务概念在"世界里"长什么样（Account, Order, Peer, MediaFrame ...）
#      - 受众：PO / 业务方 / 跨工程对齐
#      - 建模工具：四色建模（archetype: MI / Role / PPT / Description）
#      - 位置：业务视图下；跨 app 共用
#      - 不写代码层细节：no table_name, no aggregate boundary, no repository
#
#    应用领域模型（applications/<app>.yaml 的 domain_model 段）：
#      - 内容：本 app 的代码层结构如何实现业务概念（每个 app 一份）
#      - 受众：该 app 的开发者
#      - 建模工具：DDD 构造块
#        * Aggregate（聚合）— 根实体 + 内含实体 + VO + 事务边界 + 不变量
#        * Value Object（值对象）— 不可变，按值相等
#        * Repository（仓储）— 对聚合的集合抽象
#        * Domain Service（领域服务）— 不属单一聚合的领域逻辑
#        * Domain Event（领域事件）— 业务上有意义的状态变化通知
#      - 位置：应用视图下，挂在每个 app 上
#      - 同一业务实体在不同 app 可有不同实现：
#        * vchat-relay 的 Peer = 简单路由表项；
#        * vchat-client 的 Peer = 富 Aggregate（含 RouteState VO + 看门狗 Service）
#      - 也可以"不实现"——某 app 根本用不到某业务实体就不出现
#
#    跨层映射：app domain_model 的 aggregate 用 `relationships: [{kind: implements,
#    target: <BusinessEntityName>, target_kind: business-entity}]` 表达"本 app 在应用层实现了某业务实体"——
#    让 viewer 可跨视图跳转、让 AI 推理时能关联两层。
#
#    重要约束：业务实体**不属于**本 app 的领域模型层——
#      - 业务实体不能作为 aggregate.root（root 必须引用本层 entities[]，详见 NOTE 17）
#      - 业务实体不画进应用领域模型图，只在 aggregate / role 详情面板里以"实现的业务实体"形式展示
#
#    判断准则：
#      - 写一段东西在业务模型 vs 应用领域模型？看受众。给业务方/跨工程读 → 业务模型；给本 app 开发者
#        理解代码结构 → 应用领域模型。
#      - 概念名相同、但语义不同？两边都写，用 implements 关系连接。

# 17. AGGREGATE ROOT —— 引用语义而非定义语义
#
#    aggregate.root 是一个**名称引用**，指向 aggregate.entities[] 中已经定义的某个实体。
#    它不引入新名字，不声明字段，不能跨层引用业务实体。
#
#    正确写法：
#      aggregates:
#        - name: AccountAggregate
#          root: Account                         # 引用下面 entities 中的 Account
#          entities:
#            - name: Account                     # 在本层定义 Account 及其字段
#              fields:
#                - id: "Long, primary key"
#                - status: "AccountStatus, ..."
#            - name: Package                     # 聚合内其他实体
#              fields: [...]
#          relationships:
#            - kind: implements                  # 跨层映射：本 app 的 Account 实现业务实体 Account
#              target: Account
#              target_kind: business-entity
#
#    错误反模式：
#      a) root 起新名字（"LocalSession"）但 entities 里没有 LocalSession ——
#         无处声明字段、字段从哪来？读起来歧义。
#      b) root: <BusinessEntityName> 但 entities 里没该实体 ——
#         相当于把业务实体当本层实体，跨层；本层失去显式定义。
#      c) 担心 root 没字段就再起一个同名 VO 把字段塞进去 —— 重复声明、错位。
#
#    Viewer 责任：
#      - aggregate 详情中显示 root 名 + 链接到 entities[] 中对应实体；
#      - 应用领域模型图中，aggregate 节点直接以 root entity 名呈现（不再单独画 root 子节点 / 业务实体节点）；
#      - 校验：若 root 不在 entities[].name 集合中，标记为 schema error。
#
#    字段同步策略：
#      - 应用层的 root entity 与对应业务实体常常字段相同——但本层独立声明，
#        以便表达"应用层投影"（增减字段、运行时状态、技术性字段）。
#      - 字段可能与业务实体同步，也可能裁剪 / 增补；具体看应用需要。

