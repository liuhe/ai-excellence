name: ProxyTier
fields:
  - id: "Long, auto-increment primary key"
  - name: "String, display name (e.g., '高速版', '极速版')"
  - endpoint: "String, proxy address in host:port format (e.g., 'hs01.example.com:3128')"
  - bandwidthMbps: "Integer, theoretical bandwidth in Mbps (e.g., 30, 200)"
  - active: "Boolean, whether this tier is available, default true"
notes: >
  Represents a speed tier of the proxy service, each backed by a distinct proxy node.
  Admin manages tiers independently. Current tiers:
  - 高速版 (hs): ~30Mbps, endpoint hs01.example.com:3128
  - 极速版 (xs): ~200Mbps, endpoint xs01.example.com:3129
