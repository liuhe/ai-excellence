# Business Model — Overview
# Detail per entity: ./business-model/<entity>.yaml
# ER diagram: ./business-model/er.svg (TODO: generate)

entities:
  - name: Account
    summary: Proxy user with credentials. Created by admin or auto-fulfillment.
    detail: ./business-model/account.yaml
  - name: Package
    summary: Traffic quota grant for an account; only one Active per account at a time.
    detail: ./business-model/package.yaml
  - name: RedemptionCode
    summary: One-time code that creates a Package on redemption.
    detail: ./business-model/redemption-code.yaml
  - name: UsageLog
    summary: Per-request traffic record (batched from auth-proxy).
    detail: ./business-model/usage-log.yaml
  - name: TaobaoOrder
    summary: Taobao trade tracking + fulfillment state machine.
    detail: ./business-model/taobao-order.yaml
  - name: ProxyTier
    summary: Speed tier backed by a distinct proxy node (高速版/极速版).
    detail: ./business-model/proxy-tier.yaml
  - name: PackageTemplate
    summary: Specification for a class of packages, referenced by SKU and code.
    detail: ./business-model/package-template.yaml
  - name: TaobaoSku
    summary: Maps a Taobao SKU to a PackageTemplate + fulfillment behavior.
    detail: ./business-model/taobao-sku.yaml

relationships:
  - from: Package
    to: Account
    type: many-to-one
    via: accountId
    note: An account can have multiple packages (current + future)
  - from: RedemptionCode
    to: Package
    type: one-to-one
    via: packageId
    note: The package created when this code was redeemed; nullable until redemption
  - from: UsageLog
    to: Package
    type: many-to-one
    via: packageId
  - from: TaobaoOrder
    to: Account
    type: many-to-one
    via: accountId
    note: Links the Taobao order to the provisioned proxy account
  - from: TaobaoOrder
    to: RedemptionCode
    type: one-to-one
    via: redemptionCodeId
    note: Optional — redemption code generated for the buyer to use for renewals
  - from: TaobaoOrder
    to: TaobaoSku
    type: many-to-one
    via: skuId
    note: Records which SKU was ordered, used to look up package spec during fulfillment
  - from: TaobaoSku
    to: PackageTemplate
    type: many-to-one
    via: packageTemplateId
    note: Resolves Taobao SKU to the package specification to create
  - from: RedemptionCode
    to: PackageTemplate
    type: many-to-one
    via: packageTemplateId
    note: Determines what Package to create when the code is redeemed
  - from: Package
    to: ProxyTier
    type: many-to-one
    via: proxyTierId
    note: Which speed tier this package uses
  - from: PackageTemplate
    to: ProxyTier
    type: many-to-one
    via: proxyTierId
    note: Which speed tier packages created from this template will use

diagram: ./business-model/er.svg
