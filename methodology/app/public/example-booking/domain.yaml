# 领域模型 — Overview
entities:
  - name: Teacher
    table_name: teacher
    summary: 教师信息 + 状态机（Active/Suspended）
    detail: ./domain/Teacher.yaml
  - name: Student
    table_name: student
    summary: 学生信息 + 余额
    detail: ./domain/Student.yaml
  - name: Course
    table_name: course
    summary: 课程信息 + 状态机（Draft/Published/Archived）
    detail: ./domain/Course.yaml
  - name: TimeSlot
    table_name: time_slot
    summary: 教师时间槽 + 状态机（Available/Booked/Completed/Cancelled）
    detail: ./domain/TimeSlot.yaml
  - name: Booking
    table_name: booking
    summary: 预约记录 + 状态机（Pending/Confirmed/InProgress/Completed/Cancelled/Refunded）
    detail: ./domain/Booking.yaml
  - name: Review
    table_name: review
    summary: 学生对教师的评价
    detail: ./domain/Review.yaml
  - name: Settlement
    table_name: settlement
    summary: 教师月度结算单 + 状态机（Pending/Paid）
    detail: ./domain/Settlement.yaml

relationships:
  - from: Course
    to: Teacher
    type: many-to-one
    via: teacherId
  - from: TimeSlot
    to: Teacher
    type: many-to-one
    via: teacherId
  - from: Booking
    to: Student
    type: many-to-one
    via: studentId
  - from: Booking
    to: Course
    type: many-to-one
    via: courseId
  - from: Booking
    to: TimeSlot
    type: one-to-one
    via: timeSlotId
    备注: 一个时间槽只能被一个预约占用
  - from: Review
    to: Booking
    type: one-to-one
    via: bookingId
  - from: Review
    to: Teacher
    type: many-to-one
    via: teacherId
  - from: Settlement
    to: Teacher
    type: many-to-one
    via: teacherId

diagram: ./domain/er.svg
