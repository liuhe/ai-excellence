业务用例:
  - 名称: 获取优质课程辅导
    执行者: Student
    系统用例: [浏览课程, 预约课程, 上课, 评价教师]
    相关方利益:
      - 相关方: Student
        利益: 找到合适的教师，灵活安排时间，获得高质量一对一辅导
      - 相关方: EduConnect
        利益: 学生持续付费使用平台，平台从每笔交易中抽佣
  - 名称: 在线授课赚取收入
    执行者: Teacher
    系统用例: [发布课程, 管理日程]
    相关方利益:
      - 相关方: Teacher
        利益: 灵活安排授课时间，获得稳定课时收入
      - 相关方: EduConnect
        利益: 优质教师留存，课程供给充足，平台口碑好
  - 名称: 运营约课平台
    执行者: 平台运营
    系统用例: [管理用户, 结算佣金]
    相关方利益:
      - 相关方: EduConnect
        利益: 平台健康运营，GMV持续增长
      - 相关方: 平台运营
        利益: 高效管理用户和结算，减少人工介入
