# 领域模型 — Overview
entities:
  - name: Teacher
    summary: 教师信息 + 状态机（Active/Suspended）
    detail: ./business-model/Teacher.yaml
  - name: Student
    summary: 学生信息 + 余额
    detail: ./business-model/Student.yaml
  - name: Course
    summary: 课程信息 + 状态机（Draft/Published/Archived）
    detail: ./business-model/Course.yaml
  - name: TimeSlot
    summary: 教师时间槽 + 状态机（Available/Booked/Completed/Cancelled）
    detail: ./business-model/TimeSlot.yaml
  - name: Booking
    summary: 预约记录 + 状态机（Pending/Confirmed/InProgress/Completed/Cancelled/Refunded）
    detail: ./business-model/Booking.yaml
  - name: Review
    summary: 学生对教师的评价
    detail: ./business-model/Review.yaml
  - name: Settlement
    summary: 教师月度结算单 + 状态机（Pending/Paid）
    detail: ./business-model/Settlement.yaml

relationships:
  - from: Course
    to: Teacher
    type: many-to-one
    via: teacherId
  - from: TimeSlot
    to: Teacher
    type: many-to-one
    via: teacherId
  - from: Booking
    to: Student
    type: many-to-one
    via: studentId
  - from: Booking
    to: Course
    type: many-to-one
    via: courseId
  - from: Booking
    to: TimeSlot
    type: one-to-one
    via: timeSlotId
    备注: 一个时间槽只能被一个预约占用
  - from: Review
    to: Booking
    type: one-to-one
    via: bookingId
  - from: Review
    to: Teacher
    type: many-to-one
    via: teacherId
  - from: Settlement
    to: Teacher
    type: many-to-one
    via: teacherId

diagram: ./business-model/er.svg
